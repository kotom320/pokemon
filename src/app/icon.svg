<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 상단 빨간 반구 -->
  <path d="M 10,50 A 40,40 0 0,1 90,50 Z" fill="#e3350d"/>
  <!-- 하단 흰 반구 -->
  <path d="M 10,50 A 40,40 0 0,0 90,50 Z" fill="#ffffff"/>
  <!-- 중앙 가로선 -->
  <line x1="10" y1="50" x2="90" y2="50" stroke="#1a1a1a" stroke-width="5"/>
  <!-- 중앙 버튼 외곽 (검정 링) -->
  <circle cx="50" cy="50" r="13" fill="#1a1a1a"/>
  <!-- 중앙 버튼 내부 (흰 원) -->
  <circle cx="50" cy="50" r="8" fill="#ffffff"/>
</svg>
